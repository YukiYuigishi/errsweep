name: test-all

on:
  push:
  pull_request:

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXT_DIR: ${{ github.workspace }}/.ci-cache/vscode-extensions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache VS Code extensions
        uses: actions/cache@v4
        with:
          path: ${{ env.EXT_DIR }}
          key: ${{ runner.os }}-vscode-ext-golang-go-v2
          restore-keys: |
            ${{ runner.os }}-vscode-ext-

      - name: Install Neovim / Xvfb / VS Code
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y neovim xvfb wget gpg apt-transport-https

          wget -qO- https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/packages.microsoft.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main" \
            | sudo tee /etc/apt/sources.list.d/vscode.list
          sudo apt-get update
          sudo apt-get install -y code

      - name: Install Go tools
        run: |
          set -euxo pipefail
          make dev-tools
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run all tests (unit + Neovim E2E + VS Code E2E)
        run: |
          set -euxo pipefail
          mkdir -p "$EXT_DIR"
          xvfb-run -a make test-all
